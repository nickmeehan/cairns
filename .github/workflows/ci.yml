name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: bin/ci
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select pinned Xcode
        run: sudo xcode-select -s "/Applications/Xcode_$(cat .xcode-version).app"

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: bin/setup
        run: bin/setup

      - name: bin/ci
        run: bin/ci
