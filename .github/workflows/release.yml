name: Release

# "Untrusted developer" distribution until App Store signing lands:
#  - the .dmg is ad-hoc signed (right-click → Open to pass Gatekeeper)
#  - the .ipa is unsigned (sideload via AltStore/Sideloadly, or build from
#    source in Xcode with a free Apple ID)
# Written so real Apple Developer signing can layer in without restructuring.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select pinned Xcode
        run: sudo xcode-select -s "/Applications/Xcode_$(cat .xcode-version).app"

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: bin/setup
        run: bin/setup

      # macOS: archive with an ad-hoc identity, extract the .app, re-seal it so
      # Gatekeeper sees a clean ad-hoc signature, then wrap it in a UDZO DMG
      # containing the app plus an /Applications drop symlink.
      - name: Build macOS app + DMG
        run: |
          cd macos
          mise exec -- xcodegen generate
          xcodebuild archive \
            -project Cairns.xcodeproj -scheme Cairns \
            -destination 'generic/platform=macOS' \
            -archivePath ../dist/mac.xcarchive \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO
          cd ..
          cp -R dist/mac.xcarchive/Products/Applications/Cairns.app dist/Cairns.app
          codesign --force --deep -s - dist/Cairns.app
          mkdir -p dist/dmg
          cp -R dist/Cairns.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname Cairns -srcfolder dist/dmg \
            -ov -format UDZO dist/Cairns.dmg

      # iOS: archive unsigned, then package the .app into Payload/*.app → zip →
      # .ipa. No signing here by design; the sideloader re-signs on install.
      - name: Build iOS app + IPA
        run: |
          cd ios
          mise exec -- xcodegen generate
          xcodebuild archive \
            -project Cairns.xcodeproj -scheme Cairns \
            -destination 'generic/platform=iOS' \
            -archivePath ../dist/ios.xcarchive \
            CODE_SIGNING_ALLOWED=NO
          cd ../dist
          mkdir -p Payload
          cp -R ios.xcarchive/Products/Applications/Cairns.app Payload/
          zip -r Cairns.ipa Payload

      # Draft so a human reviews before publishing. Prerelease when the tag has
      # a hyphen (e.g. v1.2.0-beta.1). Uses the workflow's GITHUB_TOKEN.
      - name: Draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Cairns ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/Cairns.dmg
            dist/Cairns.ipa
